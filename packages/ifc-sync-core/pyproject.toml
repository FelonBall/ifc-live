[project]
name = "ifc-sync-core"
version = "0.1.0"
description = "SyncedIfcModel wrapper and op application for IfcOpenShell"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "ifc-live contributors" }]

dependencies = [
    "ifc-ops",
    "ifcopenshell>=0.8",
    "pydantic>=2.6",
]

[tool.uv.sources]
ifc-ops = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ifc_sync_core"]
