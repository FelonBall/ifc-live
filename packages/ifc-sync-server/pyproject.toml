[project]
name = "ifc-sync-server"
version = "0.1.0"
description = "FastAPI WebSocket relay for ifc-live"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "ifc-live contributors" }]

dependencies = [
    "ifc-ops",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "websockets>=12.0",
]

[project.scripts]
ifc-sync-server = "ifc_sync_server.cli:main"

[tool.uv.sources]
ifc-ops = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ifc_sync_server"]
