[project]
name = "ifc-sync-bonsai"
version = "0.1.0"
description = "Bonsai BIM addon for ifc-live real-time sync"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "ifc-live contributors" }]

# Note: when installed inside Blender, the addon imports `bpy` and `bonsai`
# from Blender's own Python environment. These are not declared here.
dependencies = [
    "ifc-sync-core",
    "websockets>=12.0",
]

[project.scripts]
ifc-sync-bonsai-package = "ifc_sync_bonsai.package:main"

[tool.uv.sources]
ifc-sync-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ifc_sync_bonsai"]
