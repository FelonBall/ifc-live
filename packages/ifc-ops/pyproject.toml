[project]
name = "ifc-ops"
version = "0.1.0"
description = "Pydantic data model for IFC operations"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "ifc-live contributors" }]

dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ifc_ops"]
